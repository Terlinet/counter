name: terlinet_count
description: A new Flutter project for object counting.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  video_player: ^2.8.1
  geolocator: ^11.0.0
  intl: ^0.19.0
  http: ^1.2.1
  camera: ^0.11.0
  google_mlkit_object_detection: ^0.15.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/videos/
    - assets/images/
