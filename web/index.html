<!DOCTYPE html>
<html lang="pt-br">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TerlineT Counter</title>

  <!-- MediaPipe Tasks Vision (Bundle Global) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
  <!-- Bridge Customizada -->
  <script src="mediapipe_bridge.js" defer></script>
  <script src="flutter.js" defer></script>

  <style>
    body { background-color: #000; margin: 0; overflow: hidden; }
    #loading { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: #FFA500; font-family: sans-serif; }
    .loader-bar { width: 200px; height: 2px; background: #333; margin-top: 20px; position: relative; overflow: hidden; }
    .loader-progress { width: 50%; height: 100%; background: #FFA500; position: absolute; animation: load 2s infinite linear; }
    @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }
  </style>
</head>
<body>
  <div id="loading">
    <h2 style="letter-spacing: 5px; text-shadow: 0 0 10px #FFA500;">INICIALIZANDO CORE IA...</h2>
    <div class="loader-bar"><div class="loader-progress"></div></div>
  </div>
  <script>
    window.addEventListener('load', function(ev) {
      if (typeof tasksVision !== 'undefined') {
        window.FilesetResolver = tasksVision.FilesetResolver;
        window.ObjectDetector = tasksVision.ObjectDetector;
      }
      _flutter.loader.load({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
