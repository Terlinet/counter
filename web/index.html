<!DOCTYPE html>
<html lang="pt-br">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TerlineT Vision</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <script type="module">
    // Importando diretamente do CDN como módulo
    import {
      ObjectDetector,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17";

    // Expondo para o objeto window para que o Flutter possa acessar
    window.ObjectDetector = ObjectDetector;
    window.FilesetResolver = FilesetResolver;

    let detector = null;
    let video = null;

    window.initObjectDetector = async () => {
      try {
        console.log("🟢 Iniciando Core via ESM...");

        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/wasm"
        );

        detector = await ObjectDetector.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          scoreThreshold: 0.5
        });

        window.objectDetectorInstance = detector;

        console.log("✅ Detector Operacional");
        window.dispatchEvent(new Event("mediapipe-ready"));
      } catch (error) {
        console.error("❌ Erro IA:", error);
        window.dispatchEvent(new Event("mediapipe-error"));
      }
    };

    window.runObjectDetection = (videoId) => {
      if (!detector) return [];
      video = document.getElementById(videoId);
      if (!video || video.readyState < 2) return [];

      try {
        const detections = detector.detectForVideo(video, performance.now());
        return detections.detections.map(d => ({
          class: d.categories[0].categoryName,
          score: d.categories[0].score,
          bbox: [d.boundingBox.originX, d.boundingBox.originY, d.boundingBox.width, d.boundingBox.height]
        }));
      } catch (e) {
        return [];
      }
    };
  </script>
</head>
<body style="background-color: black;">
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
