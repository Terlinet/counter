<!DOCTYPE html>
<html lang="pt-br">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TerlineT Vision</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <!-- MEDIAPIPE - USANDO UNPKG PARA EVITAR ERROS DE MIME TYPE -->
  <script src="https://unpkg.com/@mediapipe/tasks-vision@0.10.17/vision_bundle.js"></script>

  <script>
    let objectDetector = null;
    let video = null;
    let runningMode = "VIDEO";

    window.initObjectDetector = async () => {
      try {
        console.log("🟢 Iniciando Core...");
        const vision = await FilesetResolver.forVisionTasks(
          "https://unpkg.com/@mediapipe/tasks-vision@0.10.17/wasm"
        );
        objectDetector = await ObjectDetector.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float32/1/efficientdet_lite0.tflite",
            delegate: "CPU"
          },
          runningMode: runningMode,
          scoreThreshold: 0.5
        });

        video = document.getElementById("counting-video");
        if (video && video.readyState >= 2) {
          window.dispatchEvent(new Event("mediapipe-ready"));
        } else if (video) {
          video.onloadeddata = () => window.dispatchEvent(new Event("mediapipe-ready"));
        } else {
          console.error("Video element not found");
          // Tentativa de busca periódica se o Flutter demorar a injetar o view
          let retry = 0;
          const checkVideo = setInterval(() => {
            video = document.getElementById("counting-video");
            if (video) {
              clearInterval(checkVideo);
              video.onloadeddata = () => window.dispatchEvent(new Event("mediapipe-ready"));
              if (video.readyState >= 2) window.dispatchEvent(new Event("mediapipe-ready"));
            }
            if (++retry > 20) clearInterval(checkVideo);
          }, 500);
        }
      } catch (error) {
        console.error("MediaPipe init error:", error);
        window.dispatchEvent(new Event("mediapipe-error"));
      }
    };

    window.runObjectDetection = (videoId) => {
      if (!objectDetector || !video || video.readyState < 2) return [];
      try {
        const now = performance.now();
        const detections = objectDetector.detectForVideo(video, now);
        return detections.detections.map(d => ({
          class: d.categories[0]?.categoryName || "unknown",
          score: d.categories[0]?.score || 0,
          bbox: [d.boundingBox.originX, d.boundingBox.originY, d.boundingBox.width, d.boundingBox.height]
        }));
      } catch (e) {
        return [];
      }
    };

    window.addEventListener("load", () => {
      // O Flutter pode chamar isso manualmente, mas deixamos aqui como garantia
      // window.initObjectDetector();
    });
  </script>
</head>
<body style="background-color: black;">
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
