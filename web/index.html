<!DOCTYPE html>
<html lang="pt-br">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TerlineT Vision</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <!-- MEDIAPIPE - USANDO CJS COM CACHE BUSTER PARA FORÇAR ATUALIZAÇÃO -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/vision_bundle.cjs?v=2" crossorigin="anonymous"></script>

  <script>
    window.initObjectDetector = async function() {
      try {
        console.log("🟢 Iniciando Core v2...");

        // Aguarda carregar o bundle. O jsDelivr pode demorar a propagar.
        let retry = 0;
        let visionLib = null;

        while (retry < 50) {
          if (typeof vision !== 'undefined') {
            visionLib = vision;
            break;
          }
          await new Promise(r => setTimeout(r, 200));
          retry++;
        }

        if (!visionLib) throw new Error("MediaPipe library (vision) not found after retry.");

        const visionAssets = await visionLib.FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/wasm"
        );

        window.objectDetector = await visionLib.ObjectDetector.createFromOptions(visionAssets, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          scoreThreshold: 0.3
        });

        console.log("✅ Detector Operacional");
        window.dispatchEvent(new Event('mediapipe-ready'));
      } catch (err) {
        console.error("❌ Erro IA:", err);
        window.dispatchEvent(new Event('mediapipe-error'));
      }
    };

    window.runObjectDetection = function(videoID) {
      if (!window.objectDetector) return [];
      const video = document.getElementById(videoID);
      if (!video || video.readyState < 2) return [];
      try {
        const result = window.objectDetector.detectForVideo(video, performance.now());
        return result.detections.map(d => ({
          class: d.categories[0].categoryName,
          score: d.categories[0].score,
          bbox: [d.boundingBox.originX, d.boundingBox.originY, d.boundingBox.width, d.boundingBox.height]
        }));
      } catch (e) { return []; }
    };
  </script>
</head>
<body style="background-color: black;">
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
