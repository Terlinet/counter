<!DOCTYPE html>
<html lang="pt-br">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project for object counting.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="terlinet_count">

  <title>TerlineT Counter</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #000000;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #FFA500;
      font-family: sans-serif;
    }
    .loader-bar {
      width: 200px;
      height: 2px;
      background: #333;
      margin-top: 20px;
      position: relative;
      overflow: hidden;
    }
    .loader-progress {
      width: 50%;
      height: 100%;
      background: #FFA500;
      position: absolute;
      animation: load 2s infinite linear;
    }
    @keyframes load {
      0% { left: -50%; }
      100% { left: 100%; }
    }
  </style>
  <script src="flutter.js" defer></script>
</head>
<body>
  <div id="loading">
    <h2 style="letter-spacing: 5px; text-shadow: 0 0 10px #FFA500;">INICIALIZANDO SISTEMA...</h2>
    <div class="loader-bar">
      <div class="loader-progress"></div>
    </div>
  </div>

  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
