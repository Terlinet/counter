<!DOCTYPE html>
<html lang="pt-br">
<head>
  <!-- O base href é essencial para o GitHub Pages. O Flutter preencherá isso no build. -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TerlineT Vision</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <!-- MEDIA PIPE - CARREGAMENTO COM CACHE BUSTER PARA O GIT -->
  <script type="module">
    // Adicionamos ?v=1.1 para forçar o GitHub/Navegador a baixar a versão nova
    import { FilesetResolver, ObjectDetector } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17?v=1.1";
    window.FilesetResolver = FilesetResolver;
    window.ObjectDetector = ObjectDetector;
    window.isMediaPipeLoaded = true;
    console.log("✅ MediaPipe Módulo Ativo");
  </script>

  <script>
    let objectDetector = null;

    window.initObjectDetector = async function() {
      try {
        console.log("🟢 Aguardando Módulo...");
        let retry = 0;
        while (!window.isMediaPipeLoaded && retry < 100) {
          await new Promise(r => setTimeout(r, 100));
          retry++;
        }

        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/wasm"
        );

        objectDetector = await ObjectDetector.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          scoreThreshold: 0.3
        });

        console.log("✅ Detector TerlineT Online");
        window.dispatchEvent(new Event('mediapipe-ready'));
      } catch (err) {
        console.error("❌ Erro Crítico IA:", err);
        window.dispatchEvent(new Event('mediapipe-error'));
      }
    };

    window.runObjectDetection = function(videoID) {
      if (!objectDetector) return [];
      const video = document.getElementById(videoID);
      if (!video || video.readyState < 2) return [];
      try {
        const result = objectDetector.detectForVideo(video, performance.now());
        return result.detections.map(d => ({
          class: d.categories[0].categoryName,
          score: d.categories[0].score,
          bbox: [d.boundingBox.originX, d.boundingBox.originY, d.boundingBox.width, d.boundingBox.height]
        }));
      } catch (e) { return []; }
    };
  </script>
</head>
<body style="background-color: black;">
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
