<!DOCTYPE html>
<html lang="pt-br">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="TerlineT Vision System.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TerlineT Vision">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>TerlineT Vision</title>
  <link rel="manifest" href="manifest.json">

  <!-- Carrega o bundle do MediaPipe Tasks Vision -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/vision_bundle.js"></script>

  <script>
    // Variável global para o detector
    let objectDetector = null;
    let isModelReady = false;

    // Função chamada pelo Dart para iniciar o detector
    window.initObjectDetector = async function() {
      try {
        console.log("🟢 Iniciando MediaPipe Object Detector...");

        let retry = 0;
        while (typeof FilesetResolver === 'undefined' && retry < 50) {
          await new Promise(r => setTimeout(r, 100));
          retry++;
        }
        if (typeof FilesetResolver === 'undefined') {
          throw new Error("FilesetResolver não carregado");
        }

        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/wasm"
        );

        let options = {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          scoreThreshold: 0.3
        };

        try {
          objectDetector = await ObjectDetector.createFromOptions(vision, options);
          console.log("✅ Detector rodando em GPU");
        } catch (e) {
          console.warn("⚠️ Falha na GPU, tentando CPU...");
          options.baseOptions.delegate = "CPU";
          objectDetector = await ObjectDetector.createFromOptions(vision, options);
          console.log("✅ Detector rodando em CPU");
        }

        isModelReady = true;
        window.dispatchEvent(new Event('mediapipe-ready'));
      } catch (err) {
        console.error("❌ Erro ao inicializar detector:", err);
        window.dispatchEvent(new Event('mediapipe-error'));
      }
    };

    window.runObjectDetection = function(videoElementId) {
      if (!objectDetector || !isModelReady) return [];
      const video = document.getElementById(videoElementId);
      if (!video || video.readyState < 2) return [];

      try {
        const detections = objectDetector.detectForVideo(video, performance.now());
        const allowed = ['person', 'car', 'bicycle', 'motorcycle'];

        return detections.detections
          .filter(d => d.categories[0].score > 0.3 && allowed.includes(d.categories[0].categoryName))
          .map(d => ({
            class: d.categories[0].categoryName,
            score: d.categories[0].score,
            bbox: [
              d.boundingBox.originX,
              d.boundingBox.originY,
              d.boundingBox.width,
              d.boundingBox.height
            ]
          }));
      } catch (err) {
        console.error("Erro na detecção:", err);
        return [];
      }
    };
  </script>

  <script src="flutter.js" defer></script>
</head>
<body>
  <script>
    window.addEventListener('load', function(ev) {
      // Inicia MediaPipe
      window.initObjectDetector();

      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          timeoutMillis: 4000,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
