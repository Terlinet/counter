<!DOCTYPE html>
<html lang="pt-br">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TerlineT Counter</title>

  <!-- MediaPipe Tasks Vision -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/vision_bundle.js" crossorigin="anonymous"></script>
  <!-- Bridge Customizada -->
  <script src="mediapipe_bridge.js" defer></script>
  <script src="flutter.js" defer></script>

  <style>
    body { background-color: #000; margin: 0; overflow: hidden; }
    #loading { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: #FFA500; font-family: sans-serif; }
  </style>
</head>
<body>
  <div id="loading">
    <h2>INICIALIZANDO CORE IA...</h2>
  </div>
  <script>
    window.addEventListener('load', function(ev) {
      if (typeof tasksVision !== 'undefined') {
        window.FilesetResolver = tasksVision.FilesetResolver;
        window.ObjectDetector = tasksVision.ObjectDetector;
      }
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
