<!DOCTYPE html>
<html lang="pt-br">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Primary Meta Tags -->
  <title>TerlineT Vision - AI Counter</title>
  <meta name="title" content="TerlineT Vision - AI Counter">
  <meta name="description" content="Sistema de inteligência artificial TerlineT para contagem de fluxo e segurança em tempo real.">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://terlinet.github.io/counter/">
  <meta property="og:title" content="TerlineT Vision - AI Counter">
  <meta property="og:description" content="Sistema de inteligência artificial TerlineT para contagem de fluxo e segurança em tempo real.">
  <meta property="og:image" content="assets/images/preview.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://terlinet.github.io/counter/">
  <meta property="twitter:title" content="TerlineT Vision - AI Counter">
  <meta property="twitter:description" content="Sistema de inteligência artificial TerlineT para contagem de fluxo e segurança em tempo real.">
  <meta property="twitter:image" content="assets/images/preview.png">

  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <script type="module">
    // Importação direta via Módulo ES (Mais estável para Web moderno)
    import {
      ObjectDetector,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17";

    let detector = null;

    // Função com nome novo para forçar atualização do cache
    window.initObjectDetectorV3 = async () => {
      try {
        console.log("🚀 TERLINET CORE V3: Iniciando...");

        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/wasm"
        );

        detector = await ObjectDetector.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          scoreThreshold: 0.5
        });

        window.objectDetectorInstance = detector;
        console.log("✅ TERLINET CORE V3: Operacional");
        window.dispatchEvent(new Event("mediapipe-ready"));
      } catch (error) {
        console.error("❌ TERLINET CORE V3 Erro:", error);
        window.dispatchEvent(new Event("mediapipe-error"));
      }
    };

    window.runObjectDetection = (videoId) => {
      if (!detector) return [];
      const video = document.getElementById(videoId);
      if (!video || video.readyState < 2) return [];

      try {
        const detections = detector.detectForVideo(video, performance.now());
        return detections.detections.map(d => ({
          class: d.categories[0].categoryName,
          score: d.categories[0].score,
          bbox: [d.boundingBox.originX, d.boundingBox.originY, d.boundingBox.width, d.boundingBox.height]
        }));
      } catch (e) {
        return [];
      }
    };
  </script>
</head>
<body style="background-color: black;">
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
