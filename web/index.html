<!DOCTYPE html>
<html lang="pt-br">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TerlineT Vision</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <!-- MEDIAPIPE - CARREGAMENTO ATUALIZADO (CJS PARA COMPATIBILIDADE) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/vision_bundle.cjs" crossorigin="anonymous"></script>

  <script>
    let objectDetector = null;

    window.initObjectDetector = async function() {
      try {
        console.log("🟢 Iniciando Core...");

        // Aguarda o MediaPipe estar disponível no objeto global (tasks-vision exporta para o objeto global se for CJS)
        let retry = 0;
        while (typeof vision === 'undefined' && typeof FilesetResolver === 'undefined' && retry < 100) {
          await new Promise(r => setTimeout(r, 100));
          retry++;
        }

        // Se usar o bundle CJS, o FilesetResolver costuma estar dentro de um namespace ou global
        const resolver = typeof FilesetResolver !== 'undefined' ? FilesetResolver : vision.FilesetResolver;
        const detector = typeof ObjectDetector !== 'undefined' ? ObjectDetector : vision.ObjectDetector;

        const visionAssets = await resolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/wasm"
        );

        objectDetector = await detector.createFromOptions(visionAssets, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          scoreThreshold: 0.3
        });

        console.log("✅ Detector Operacional");
        window.dispatchEvent(new Event('mediapipe-ready'));
      } catch (err) {
        console.error("❌ Erro IA:", err);
        window.dispatchEvent(new Event('mediapipe-error'));
      }
    };

    window.runObjectDetection = function(videoID) {
      if (!objectDetector) return [];
      const video = document.getElementById(videoID);
      if (!video || video.readyState < 2) return [];
      try {
        const result = objectDetector.detectForVideo(video, performance.now());
        return result.detections.map(d => ({
          class: d.categories[0].categoryName,
          score: d.categories[0].score,
          bbox: [d.boundingBox.originX, d.boundingBox.originY, d.boundingBox.width, d.boundingBox.height]
        }));
      } catch (e) { return []; }
    };
  </script>
</head>
<body style="background-color: black;">
  <!-- O segredo para o Flutter 3.22+ no Git é usar o bootstrap padrão -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
