<!DOCTYPE html>
<html lang="pt-br">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="TerlineT Vision System.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TerlineT Vision">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>TerlineT Vision</title>
  <link rel="manifest" href="manifest.json">

  <!-- Carregamento Seguro do MediaPipe via Módulo -->
  <script type="module">
    import { FilesetResolver, ObjectDetector } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17";
    window.FilesetResolver = FilesetResolver;
    window.ObjectDetector = ObjectDetector;
    console.log("✅ MediaPipe carregado com sucesso.");
  </script>

  <script>
    let objectDetector = null;
    let isModelReady = false;

    window.initObjectDetector = async function() {
      try {
        console.log("🟢 Iniciando Detector...");

        let retry = 0;
        while (typeof FilesetResolver === 'undefined' && retry < 50) {
          await new Promise(r => setTimeout(r, 100));
          retry++;
        }

        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/wasm"
        );

        const options = {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          scoreThreshold: 0.3
        };

        objectDetector = await ObjectDetector.createFromOptions(vision, options);
        isModelReady = true;
        console.log("✅ Detector Operacional");
        window.dispatchEvent(new Event('mediapipe-ready'));
      } catch (err) {
        console.error("❌ Erro IA:", err);
        window.dispatchEvent(new Event('mediapipe-error'));
      }
    };

    window.runObjectDetection = function(videoID) {
      if (!objectDetector || !isModelReady) return [];
      const video = document.getElementById(videoID);
      if (!video || video.readyState < 2) return [];
      try {
        const result = objectDetector.detectForVideo(video, performance.now());
        const allowed = ['person', 'car', 'bicycle', 'motorcycle'];
        return result.detections
          .filter(d => d.categories[0].score > 0.3 && allowed.includes(d.categories[0].categoryName))
          .map(d => ({
            class: d.categories[0].categoryName,
            score: d.categories[0].score,
            bbox: [d.boundingBox.originX, d.boundingBox.originY, d.boundingBox.width, d.boundingBox.height]
          }));
      } catch (e) { return []; }
    };
  </script>
</head>
<body>
  <!-- Inicialização do Flutter -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
